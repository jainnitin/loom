<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Chocolate rounded square background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a2521"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f5a97f"/>
      <stop offset="100%" stop-color="#e08a60"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Woven threads (2 warp + 2 weft) with rounded caps -->
  <g stroke="url(#thread)" stroke-width="36" stroke-linecap="round" fill="none">
    <!-- Warp: vertical -->
    <line x1="186" y1="120" x2="186" y2="392"/>
    <line x1="326" y1="120" x2="326" y2="392"/>
    <!-- Weft: horizontal (slightly behind the warp where they cross to suggest weave) -->
    <line x1="120" y1="186" x2="392" y2="186"/>
    <line x1="120" y1="326" x2="392" y2="326"/>
  </g>

  <!-- Subtle highlights at the cross points for a "woven" feel -->
  <g fill="#fff8ee" opacity="0.12">
    <circle cx="186" cy="186" r="10"/>
    <circle cx="326" cy="186" r="10"/>
    <circle cx="186" cy="326" r="10"/>
    <circle cx="326" cy="326" r="10"/>
  </g>
</svg>
